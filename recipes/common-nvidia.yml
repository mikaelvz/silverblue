modules:
  # Nvidia signing key addons
  - type: containerfile
    snippets:
      - COPY --from=ghcr.io/ublue-os/akmods:main-40 /rpms /tmp/rpms
      - RUN rpm-ostree install /tmp/rpms/ublue-os/ublue-os-akmods-addons*.rpm

  # Nvidia drivers
  - type: containerfile
    snippets:
      - COPY --from=ghcr.io/ublue-os/akmods-nvidia:main-40 /rpms /tmp/rpms
      - RUN rpm-ostree install /tmp/rpms/ublue-os/ublue-os-nvidia*.rpm
      - RUN rpm-ostree install /tmp/rpms/kmods/kmod-nvidia*.rpm xorg-x11-drv-nvidia xorg-x11-drv-nvidia-cuda nvidia-vaapi-driver