name: silverblue-kled
description: "This is a custom Universal Blue image for the Acer Chromebook Spin 713 (CP713-2W) Chromebook (board name: KLED)."

base-image: ghcr.io/ublue-os/silverblue-main
image-version: latest

modules:
  # Files
  - type: files
    files:
      - source: system
        destination: /

  # Install keyd
  - type: rpm-ostree
    repos:
      - https://copr.fedorainfracloud.org/coprs/alternateved/keyd/repo/fedora-%OS_VERSION%/alternateved-keyd-fedora-%OS_VERSION%.repo
    install:
      - keyd
  - type: systemd
    system:
      enabled:
        - keyd.service

  # Install keyboard configuration
  - type: files
    files:
      - source: submodule/cros-keyboard-map/local-overrides.quirks
        destination: /etc/libinput/local-overrides.quirks

  - type: script
    scripts:
      - build.sh

  - type: signing