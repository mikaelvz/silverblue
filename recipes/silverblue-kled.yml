name: silverblue-kled
description: "This is a custom Universal Blue image for the Acer Chromebook Spin 713 (CP713-2W) Chromebook (board name: KLED)."

base-image: ghcr.io/ublue-os/silverblue-main
image-version: latest

modules:
  # Files
  - type: files
    files:
      - source: system
        destination: /

  # Install keyd
  - type: rpm-ostree
    repos:
      - https://copr.fedorainfracloud.org/coprs/alternateved/keyd/repo/fedora-%OS_VERSION%/alternateved-keyd-fedora-%OS_VERSION%.repo
    install:
      - keyd
  - type: systemd
    system:
      enabled:
        - keyd.service

  # Install keyboard configuration
  - type: files
    files:
      - source: submodule/cros-keyboard-map/local-overrides.quirks
        destination: /etc/libinput/local-overrides.quirks

  # Install SOF
  - type: files
    files:
      - source: submodule/chromebook-linux-audio/conf/sof/tplg
        destination: /lib/firmware/intel/sof-tplg/

  # Install UCM configuration
  - type: files
    files:
      - source: submodule/chromebook-ucm-conf/cml
        destination: /usr/share/alsa/ucm2/conf.d/
      - source: submodule/chromebook-ucm-conf/common
        destination: /usr/share/alsa/ucm2/common/
      - source: submodule/chromebook-ucm-conf/codecs
        destination: /usr/share/alsa/ucm2/codecs/
      - source: submodule/chromebook-ucm-conf/platforms
        destination: /usr/share/alsa/ucm2/platforms/
      - source: submodule/chromebook-ucm-conf/sof-rt5682
        destination: /usr/share/alsa/ucm2/conf.d/sof-rt5682/
      - source: submodule/chromebook-ucm-conf/sof-cs42l42
        destination: /usr/share/alsa/ucm2/conf.d/sof-cs42l42/

  # Build script
  - type: script
    scripts:
      - build.sh

  # Signing image
  - type: signing